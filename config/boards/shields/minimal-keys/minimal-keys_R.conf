# ===== BOTH SIDES REQUIRED (must match L/R) =====
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

# ===== CENTRAL ONLY =====
CONFIG_ZMK_KEYBOARD_NAME="minimal-keys"
CONFIG_ZMK_BLE=y

# BLE connection stability
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# BLE connection interval for host (Mac/Windows/etc.)
# Apple QA1931 + ADG R29: MIN>=15ms, MAX>=MIN+15ms, Timeout 2-6s
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# BLE connection limits (4 profiles + 1 peripheral = 5)
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Windows BLE pairing compatibility
CONFIG_BT_SMP_SC_PAIR_ONLY=n

CONFIG_BT_BAS=y

# Pointing device (PMW3610 trackball)
CONFIG_ZMK_POINTING=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=2400
CONFIG_PMW3610_X_SCALE=45
CONFIG_PMW3610_Y_SCALE=45
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_180=n
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=10
CONFIG_PMW3610_FORCE_AWAKE=y
CONFIG_PMW3610_POLLING_RATE_250=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=700
CONFIG_PMW3610_SMART_ALGORITHM=n
CONFIG_PMW3610_ADJUSTABLE_MOUSESPEED=n
CONFIG_PMW3610_MOVEMENT_THRESHOLD=6
CONFIG_PMW3610_DEADZONE=0
CONFIG_PMW3610_DEADZONE_CLEAR=0
CONFIG_PMW3610_DEADZONE_TIMEOUT_MS=100
CONFIG_PMW3610_DEADZONE_CONSEC_FRAMES=1
CONFIG_PMW3610_DEADZONE_REMAINDER_CAP_X10=10
CONFIG_PMW3610_DEADZONE_ZONE_A_CONSEC=3
CONFIG_PMW3610_AXIS_LOCK_RATIO=0
CONFIG_PMW3610_DELTA_CLAMP=y
CONFIG_PMW3610_DELTA_CLAMP_MAX=80
CONFIG_FPU=y

# RGB LED widget
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

# ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_TRANSPORT_BLE=y

# Studio RPC buffers. Defaults RX=30/TX=64 deadlock write_rpc_req when a single
# BLE write exceeds the RX ring (setCombo frames are 33-50B), which spins the
# cooperative BT RX workqueue and freezes the keyboard -> host BLE timeout.
# Enlarge so an MTU-bounded write fits in one ring_buf claim.
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=256
CONFIG_ZMK_STUDIO_RPC_TX_BUF_SIZE=512
# Default 25B silently fails to decode 3-4 key combos with a layer mask; raise
# it (must stay < RPC_RX_BUF_SIZE).
CONFIG_ZMK_STUDIO_RPC_CUSTOM_SUBSYSTEM_REQUEST_PAYLOAD_MAX_BYTES=128
# Precautionary headroom for the low-priority workqueue that emits indications.
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=2048

# Diagnostic data logger (in-memory ring buffer + USB serial dump)
CONFIG_PMW3610_DATA_LOGGER=y
CONFIG_PMW3610_DATA_LOGGER_ANOMALY_FREEZE=y
CONFIG_PMW3610_DATA_LOGGER_BLE=n
# Phase 0 BLE HID diagnostics: notify-failure counters + conn interval capture.
# No GATT change, no settings_reset. Turn off for release builds.
CONFIG_MK2_BLE_DIAG=n
# Phase 4 cursor-lag fix: coalesce the 250 Hz mouse backlog into a delta
# accumulator (R/Central only). Off = original msgq. See MK2_HOG_MOUSE_ACC.
CONFIG_MK2_HOG_MOUSE_ACC=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_ZMK_LOGGING_MINIMAL=y
CONFIG_PMW3610_LOG_LEVEL_INF=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Custom Studio modules (minimal-keys Studio)
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR=y
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR_STUDIO_RPC=y
CONFIG_ZMK_BLE_MANAGEMENT=y
CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=y
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE=y
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE_STUDIO_RPC=y
CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SETTINGS_RPC_STUDIO=y
CONFIG_ZMK_RUNTIME_HOLD_TAP=y
CONFIG_ZMK_RUNTIME_HOLD_TAP_STUDIO_RPC=y
CONFIG_ZMK_RUNTIME_COMBOS=y
CONFIG_ZMK_RUNTIME_COMBOS_STUDIO_RPC=y
CONFIG_ZMK_BATTERY_HISTORY=y
CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=y
