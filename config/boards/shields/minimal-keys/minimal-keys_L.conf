# ===== BOTH SIDES REQUIRED (must match L/R) =====
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
CONFIG_ZMK_SPLIT_RELAY_EVENT_TYPE_NAME_LEN=32
CONFIG_ZMK_SPLIT_RELAY_EVENT_DATA_LEN=64
CONFIG_ZMK_BATTERY_HISTORY=y
# NOTE: CONFIG_MK2_BLE_DIAG is Central-only (R). The peripheral has no host HOG
# link and no trackball data logger, so the diagnostics are meaningless here and
# omitting the symbol avoids an unmet-dependency (ZMK_BLE) Kconfig warning.

# ===== PERIPHERAL ONLY =====
# Rotary encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# BLE signal strength (must match R side)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Increase peripheral BLE stack for battery-history + relay event overhead
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=4096
